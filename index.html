  <style>
    :root {
      color-scheme: dark;
      --bg: #05080c;
      --text: #eaf1f8;
      --muted: #92a3ba;
      --teal: #14b8a6;
      --teal-deep: #12707a;
      --pink: #ec4899;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
      background: var(--bg); color: var(--text); overflow: hidden;
    }

    /* ===== Player fills the whole screen ===== */
    .player {
      position: relative;
      width: 100vw; width: 100dvw;
      height: 100vh; height: 100dvh;
      background: #000;
      overflow: hidden;
    }
    .video-wrap { position: absolute; inset: 0; }
    video { width: 100%; height: 100%; display: block; object-fit: contain; background: #000; }

    /* ---- Top info bar (hotel ticker + clock) ---- */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(40px + env(safe-area-inset-top, 0px));
      padding-top: env(safe-area-inset-top, 0px);
      display: flex; align-items: stretch; z-index: 4; pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(0,0,0,0));
    }
    .tick-brand {
      flex: none; display: flex; align-items: center; padding: 0 14px;
      background: var(--teal-deep); color: #fff; font-weight: 800; font-size: 0.74rem; white-space: nowrap;
    }
    .tick-view { flex: 1; overflow: hidden; display: flex; align-items: center; }
    .tick-track { display: flex; white-space: nowrap; animation: tick 28s linear infinite; }
    .tick-track span { padding: 0 26px; font-size: 0.8rem; color: #f0f5fb; }
    @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .clock { flex: none; display: flex; align-items: center; padding: 0 14px; font-size: 0.84rem; font-weight: 700; color: #fff; white-space: nowrap; }

    /* ---- Change-channel button (top-right) ---- */
    .chg-btn {
      position: absolute;
      top: calc(46px + env(safe-area-inset-top, 0px));
      right: 14px;
      display: inline-flex; align-items: center; gap: 8px;
      height: 46px; padding: 0 20px;
      border-radius: 999px;
      background: rgba(10,15,22,0.62);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; z-index: 6; backdrop-filter: blur(6px);
    }
    .chg-btn:active { transform: scale(0.96); }
    .chg-btn .ic { font-size: 1.05rem; }

    /* ---- Now-playing chip (bottom-left, brief) ---- */
    .np {
      position: absolute; left: 14px; bottom: calc(14px + env(safe-area-inset-bottom,0px));
      display: flex; align-items: center; gap: 10px; max-width: 62%;
      padding: 8px 14px 8px 8px; background: rgba(8,12,20,0.72); backdrop-filter: blur(8px);
      border-radius: 12px; z-index: 5; opacity: 0; transform: translateY(6px);
      transition: opacity .25s, transform .25s; pointer-events: none;
    }
    .np.show { opacity: 1; transform: none; }
    .np img { width: 34px; height: 34px; object-fit: contain; border-radius: 7px; flex: none; }
    .np-name { font-weight: 700; font-size: 0.95rem; }
    .np-status { font-size: 0.75rem; color: var(--muted); }
    .np-status.ok { color: var(--teal); }
    .np-status.err { color: #ff6b6b; }
    .retry-btn {
      display: none; margin-top: 6px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px; background: rgba(255,255,255,0.12); color: #fff; cursor: pointer;
      font: inherit; font-size: 0.75rem; font-weight: 700; pointer-events: auto;
    }
    .retry-btn.show { display: inline-block; }

    /* ---- Bottom-right controls ---- */
    .pbtns {
      position: absolute; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom,0px));
      display: flex; gap: 10px; z-index: 5;
    }
    .pbtn {
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.28); background: rgba(8,12,20,0.55);
      color: #fff; font-size: 1.15rem; cursor: pointer; backdrop-filter: blur(6px);
    }
    .pbtn:active { transform: scale(0.94); }
    .vol-pop {
      position: absolute; right: 70px; bottom: calc(16px + env(safe-area-inset-bottom,0px));
      width: 46px; height: 130px; background: rgba(8,12,20,0.85);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 23px;
      display: none; align-items: center; justify-content: center; z-index: 6;
    }
    .vol-pop.show { display: flex; }
    .vol-pop input { width: 96px; transform: rotate(-90deg); accent-color: var(--teal); }
    .sound-prompt {
      position: absolute; left: 50%; bottom: 70px; transform: translateX(-50%);
      background: rgba(8,12,20,0.9); color: #fff; font-size: 0.85rem; font-weight: 600;
      padding: 9px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25);
      z-index: 6; white-space: nowrap; display: none;
    }
    .sound-prompt.show { display: block; }

    /* ---- Channel picker overlay (slides in from right) ---- */
    .ov-backdrop { position: absolute; inset: 0; z-index: 7; display: none; }
    .ov-backdrop.open { display: block; }
    .overlay {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: min(430px, 82vw);
      display: flex; flex-direction: column; z-index: 8;
      background: linear-gradient(90deg, rgba(6,10,15,0.35), rgba(8,12,18,0.94) 22%);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transform: translateX(100%); transition: transform .28s ease;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .overlay.open { transform: translateX(0); }
    .ov-head { flex: none; display: flex; align-items: center; gap: 10px; padding: 14px 14px 10px; }
    .ov-search {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 9px 15px;
    }
    .ov-search input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--text); font-size: 0.92rem; }
    .ov-search input::placeholder { color: var(--muted); }
    .ov-search .ic { color: var(--muted); }
    .ov-close {
      flex: none; width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      color: #fff; font-size: 1.15rem; cursor: pointer;
    }
    .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .list::-webkit-scrollbar { width: 7px; }
    .list::-webkit-scrollbar-thumb { background: #29384c; border-radius: 4px; }

    .row {
      display: flex; align-items: center; gap: 14px; padding: 12px 16px;
      cursor: pointer; position: relative; border-bottom: 1px solid rgba(255,255,255,0.07); min-height: 68px;
    }
    .row:active { background: rgba(255,255,255,0.06); }
    @media (hover: hover) { .row:hover { background: rgba(255,255,255,0.05); } }
    .row.active { background: rgba(20,184,166,0.16); }
    .row.active::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--teal); border-radius: 0 3px 3px 0; }
    .logo { width: 52px; height: 52px; flex: none; border-radius: 50%; background: rgba(255,255,255,0.09); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo img { max-width: 66%; max-height: 66%; object-fit: contain; }
    .rinfo { flex: 1; min-width: 0; }
    .rname { font-size: 1.04rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rmeta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .rnum { flex: none; background: rgba(255,255,255,0.12); color: #aabbd0; font-size: 0.72rem; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
    .row.active .rnum { background: var(--teal-deep); color: #d6fbf5; }
    .rcat { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .live { flex: none; display: flex; align-items: center; gap: 5px; background: linear-gradient(135deg, var(--pink), #db2777); color: #fff; font-size: 0.68rem; font-weight: 800; padding: 5px 11px; border-radius: 999px; }
    .live .lg { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .empty { padding: 34px 20px; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .install { display: none; margin: 10px 14px calc(14px + env(safe-area-inset-bottom,0px)); align-items: center; justify-content: center; gap: 8px; background: var(--teal-deep); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    /* ---- Category filter chips ---- */
    .chips { flex: none; display: flex; gap: 8px; overflow-x: auto; padding: 2px 14px 12px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: none; white-space: nowrap; cursor: pointer;
      padding: 7px 15px; border-radius: 999px; font-size: 0.82rem; font-weight: 700;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: var(--muted);
    }
    .chip.active { background: var(--teal); border-color: var(--teal); color: #04231f; }

    /* ---- Favorite star ---- */
    .star { flex: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; color: #55677e; cursor: pointer; }
    .star.on { color: #ffcb45; }

    /* ---- Loading spinner ---- */
    .spinner {
      position: absolute; left: 50%; top: 50%; width: 46px; height: 46px; margin: -23px 0 0 -23px;
      border: 4px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%;
      z-index: 3; display: none; animation: spin 0.8s linear infinite;
    }
    .player.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Wide screens / landscape tablets / desktop / TV: channel list is a
       permanent side panel, not a popup. Phones stay popup-only (below). ===== */
    @media (min-width: 900px) and (min-aspect-ratio: 1/1) {
      .player { display: flex; }
      .video-wrap { position: relative; inset: auto; flex: 1; min-width: 0; height: 100%; }
      .ov-backdrop { display: none !important; }
      .chg-btn { display: none !important; }
      .ov-close { display: none !important; }
      .overlay {
        position: relative;
        top: auto; right: auto; bottom: auto;
        flex: none;
        width: min(400px, 34vw);
        transform: none !important;
        background: #0d141d;
        border-left: 1px solid rgba(255,255,255,0.08);
      }
    }
  </style>

<body>

    <!-- Channel picker: popup on phones, permanent side panel on wide/landscape screens -->

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    var video = document.getElementById('video');
    var player = document.getElementById('player');
    var npEl = document.getElementById('np');
    var npLogo = document.getElementById('npLogo');
    var npName = document.getElementById('npName');
    var npStatus = document.getElementById('npStatus');
    var retryBtn = document.getElementById('retryBtn');
    var listEl = document.getElementById('list');
    var searchInput = document.getElementById('searchInput');
    var overlay = document.getElementById('overlay');
    var ovBackdrop = document.getElementById('ovBackdrop');
    var hls = null, allItems = [], activeUrl = null, npTimer = null, activeItem = null;
    var loadSession = 0, recoveryAttempts = 0, maxRecoveryAttempts = 2, nativeHandlers = null;
    var chipsEl = document.getElementById('chips');
    var currentFilter = 'all';
    var favs = {};
    try { favs = JSON.parse(localStorage.getItem('roys_favs') || '{}') || {}; } catch (e) { favs = {}; }
    function saveFavs() { try { localStorage.setItem('roys_favs', JSON.stringify(favs)); } catch (e) {} }
    function toggleFav(url) { if (favs[url]) delete favs[url]; else favs[url] = 1; saveFavs(); }

    /* ---- Overlay open/close ---- */
    // Guard against a tap that opens the panel also being seen (via bubbling /
    // the backdrop underneath) as an immediate "tap outside to close" on the
    // very same gesture - that double-fire looked like the panel "bouncing"
    // open then shut. Only the open->immediate-close case is guarded; closing
    // later (picking a channel, tapping X) always works normally.
    var ovLastOpenAt = 0;
    function openOverlay() {
      if (overlay.classList.contains('open')) return;
      ovLastOpenAt = Date.now();
      renderList();
      overlay.classList.add('open');
      ovBackdrop.classList.add('open');
      var act = listEl.querySelector('.row.active');
      if (act) act.scrollIntoView({ block: 'center' });
    }
    function closeOverlay() {
      if (!overlay.classList.contains('open')) return;
      if (Date.now() - ovLastOpenAt < 250) return; // swallow the accidental same-gesture close
      overlay.classList.remove('open');
      ovBackdrop.classList.remove('open');
      searchInput.blur();
    }
    document.getElementById('chgBtn').addEventListener('click', function (e) { e.stopPropagation(); openOverlay(); });
    document.getElementById('ovClose').addEventListener('click', function (e) { e.stopPropagation(); closeOverlay(); });
    ovBackdrop.addEventListener('click', closeOverlay);

    /* ---- Now-playing chip ---- */
    function showNP(persist) {
      npEl.classList.add('show'); clearTimeout(npTimer);
      if (!persist) npTimer = setTimeout(function () {
        if (npStatus.className.indexOf('err') === -1) npEl.classList.remove('show');
      }, 3200);
    }

    /* ---- Sound ---- */
    var soundPrompt = document.getElementById('soundPrompt');
    var soundUnlocked = false;
    function unlockSound() {
      if (soundUnlocked) return;
      soundUnlocked = true; video.muted = false; video.play().catch(function(){}); soundPrompt.classList.remove('show');
    }
    function tryAutoplayWithSound() {
      video.muted = false; var p = video.play();
      if (p && p.catch) p.catch(function () { video.muted = true; video.play().catch(function(){}); if (!soundUnlocked) soundPrompt.classList.add('show'); });
      else soundUnlocked = true;
    }
    ['click','touchstart','keydown'].forEach(function (ev) { document.addEventListener(ev, unlockSound, { passive: true }); });

    var soundBtn = document.getElementById('soundBtn');
    var volPop = document.getElementById('volPop');
    var volSlider = document.getElementById('volSlider');
    function updateSoundIcon() {
      var muted = video.muted || video.volume === 0;
      soundBtn.textContent = muted ? '🔇' : (video.volume < 0.5 ? '🔉' : '🔊');
      volSlider.value = Math.round((muted ? 0 : video.volume) * 100);
    }
    soundBtn.addEventListener('click', function (e) { e.stopPropagation(); volPop.classList.toggle('show'); });
    volSlider.addEventListener('input', function () {
      var v = Number(volSlider.value) / 100; video.volume = v; video.muted = false;
      if (v > 0) { soundUnlocked = true; video.play().catch(function(){}); soundPrompt.classList.remove('show'); }
      updateSoundIcon();
    });
    document.addEventListener('click', function (e) { if (!volPop.contains(e.target) && e.target !== soundBtn) volPop.classList.remove('show'); });
    video.addEventListener('volumechange', updateSoundIcon);
    updateSoundIcon();

    /* ---- Robust fullscreen (native -> iOS video -> CSS pseudo) ---- */
    var fsBtn = document.getElementById('fsBtn');
    function nativeFsElement() { return document.fullscreenElement || document.webkitFullscreenElement || null; }
    function pseudoOn() { player.classList.add('pseudo-fs'); fsBtn.textContent = '✕'; }
    function pseudoOff() { player.classList.remove('pseudo-fs'); fsBtn.textContent = '⛶'; }
    function enterFullscreen() {
      // NOTE: we deliberately do NOT use video.webkitEnterFullscreen() on iOS -
      // that hands the whole screen to Apple's native player chrome and hides
      // our channel-picker UI entirely (no way to change channel). CSS
      // pseudo-fullscreen keeps our own controls intact on every device.
      //
      // Also: iOS Safari has `Element.requestFullscreen` as a *property* that
      // exists but silently does nothing when called on a non-<video>
      // element - it never rejects, so a plain `if (player.requestFullscreen)`
      // check passes and the button ends up doing nothing at all. Gate on
      // `document.fullscreenEnabled` (reliably false on iOS Safari) instead
      // of just checking the function reference exists.
      if (document.fullscreenEnabled && player.requestFullscreen) {
        var p = player.requestFullscreen();
        if (p && p.catch) p.catch(pseudoOn); else if (!p) pseudoOn();
        return;
      }
      if (document.webkitFullscreenEnabled && player.webkitRequestFullscreen) {
        player.webkitRequestFullscreen();
        return;
      }
      pseudoOn();
    }
    function exitFullscreen() {
      if (document.exitFullscreen) document.exitFullscreen().catch(function(){});
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      pseudoOff();
    }
    fsBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (nativeFsElement() || player.classList.contains('pseudo-fs')) exitFullscreen(); else enterFullscreen();
    });
    ['fullscreenchange','webkitfullscreenchange'].forEach(function (ev) {
      document.addEventListener(ev, function () { fsBtn.textContent = nativeFsElement() ? '✕' : '⛶'; });
    });

    /* ---- Parse M3U ---- */
    function parseM3U(text) {
      var lines = text.split(/\r?\n/), items = [], pending = null;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim(); if (!line) continue;
        if (line.indexOf('#EXTINF') === 0) {
          var comma = line.lastIndexOf(','), attrs = line.substring(0, comma), name = line.substring(comma + 1).trim();
          var logo = (attrs.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          var group = (attrs.match(/group-title="([^"]*)"/) || [])[1] || 'อื่นๆ'; group = group.split(';')[0];
          pending = { name: name, logo: logo, group: group };
        } else if (line.indexOf('#') !== 0 && pending) { pending.url = line; items.push(pending); pending = null; }
      }
      return items;
    }

    /* ---- Preconnect neighbours ---- */
    var preconnected = {};
    function preconnectOrigin(url) {
      try { var o = new URL(url).origin; if (preconnected[o]) return; preconnected[o] = true;
        var l = document.createElement('link'); l.rel = 'preconnect'; l.href = o; l.crossOrigin = 'anonymous'; document.head.appendChild(l);
      } catch (e) {}
    }
    function preconnectNeighbors(idx) {
      var n = allItems.length; if (!n) return;
      [idx - 1, idx + 1].forEach(function (j) { var k = (j + n) % n; if (allItems[k]) preconnectOrigin(allItems[k].url); });
    }

    /* ---- Sync active highlight across the (single) list by url ---- */
    function markActive() {
      listEl.querySelectorAll('.row').forEach(function (r) {
        var on = r.dataset.url === activeUrl;
        r.classList.toggle('active', on);
        var live = r.querySelector('.live');
        if (on && !live) { var b = document.createElement('div'); b.className = 'live'; b.innerHTML = '<span class="lg"></span>LIVE'; r.appendChild(b); }
        if (!on && live) live.remove();
      });
    }

    /* ---- Load a channel (session-safe with bounded recovery) ---- */
    function isCurrent(session) { return session === loadSession; }
    function setStatus(session, text, state, persist) {
      if (!isCurrent(session)) return;
      npStatus.textContent = text; npStatus.className = 'np-status' + (state ? ' ' + state : '');
      retryBtn.classList.toggle('show', state === 'err');
      if (state === 'err') player.classList.remove('loading');
      showNP(persist || state === 'err');
    }
    function clearNativeHandlers() {
      if (!nativeHandlers) return;
      video.removeEventListener('loadedmetadata', nativeHandlers.loadedmetadata);
      video.removeEventListener('error', nativeHandlers.error);
      nativeHandlers = null;
    }
    function disposePlayback() {
      clearNativeHandlers();
      if (hls) { hls.destroy(); hls = null; }
      video.removeAttribute('src');
      try { video.load(); } catch (e) {}
    }
    function failChannel(session) {
      if (!isCurrent(session)) return;
      setStatus(session, 'เล่นช่องนี้ไม่ได้ โปรดลองใหม่', 'err', true);
    }
    function recoverHls(session, data) {
      if (!isCurrent(session)) return;
      if (recoveryAttempts >= maxRecoveryAttempts) { failChannel(session); return; }
      recoveryAttempts++;
      setStatus(session, 'กำลังเชื่อมต่อใหม่ (' + recoveryAttempts + '/' + maxRecoveryAttempts + ')…', '', true);
      if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
        hls.recoverMediaError();
      } else {
        hls.startLoad();
      }
    }
    function loadChannel(item) {
      var session = ++loadSession;
      activeItem = item; activeUrl = item.url; recoveryAttempts = 0;
      markActive(); player.classList.add('loading'); retryBtn.classList.remove('show');
      npLogo.src = item.logo; npLogo.style.display = item.logo ? '' : 'none';
      npName.textContent = item.name;
      setStatus(session, 'กำลังเชื่อมต่อ…', '', true);
      disposePlayback();
      var curIdx = allItems.findIndex(function (it) { return it.url === item.url; });
      if (curIdx !== -1) preconnectNeighbors(curIdx);

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ startFragPrefetch: true, testBandwidth: false, startLevel: 0, maxBufferLength: 10, maxMaxBufferLength: 60, manifestLoadingTimeOut: 8000, manifestLoadingMaxRetry: 2, fragLoadingTimeOut: 15000 });
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          if (!isCurrent(session)) return;
          recoveryAttempts = 0; player.classList.remove('loading'); setStatus(session, 'กำลังรับชม', 'ok');
          video.play().catch(function () {});
        });
        hls.on(Hls.Events.ERROR, function (evt, data) {
          if (!isCurrent(session) || !data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR || data.type === Hls.ErrorTypes.MEDIA_ERROR) recoverHls(session, data);
          else failChannel(session);
        });
        hls.loadSource(item.url); hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        nativeHandlers = {
          loadedmetadata: function () {
            if (!isCurrent(session)) return;
            player.classList.remove('loading'); setStatus(session, 'กำลังรับชม', 'ok'); video.play().catch(function () {});
          },
          error: function () {
            if (!isCurrent(session)) return;
            if (recoveryAttempts < maxRecoveryAttempts) {
              recoveryAttempts++; setStatus(session, 'กำลังเชื่อมต่อใหม่ (' + recoveryAttempts + '/' + maxRecoveryAttempts + ')…', '', true);
              video.load(); video.play().catch(function () {});
            } else failChannel(session);
          }
        };
        video.addEventListener('loadedmetadata', nativeHandlers.loadedmetadata);
        video.addEventListener('error', nativeHandlers.error);
        video.src = item.url; video.load(); video.play().catch(function () {});
      } else {
        failChannel(session);
      }
    }
    retryBtn.addEventListener('click', function (e) { e.stopPropagation(); if (activeItem) loadChannel(activeItem); });

    video.addEventListener('ended', function () { video.currentTime = 0; video.play(); });
    video.addEventListener('playing', function () { player.classList.remove('loading'); });
    video.addEventListener('playing', function once() { video.removeEventListener('playing', once); tryAutoplayWithSound(); });

    /* ---- Channel up/down (TV remote + swipe) ---- */
    function changeChannel(delta) {
      if (!allItems.length) return;
      var idx = allItems.findIndex(function (it) { return it.url === activeUrl; }); if (idx === -1) idx = 0;
      loadChannel(allItems[(idx + delta + allItems.length) % allItems.length]);
    }
    document.addEventListener('keydown', function (e) {
      var typing = document.activeElement && document.activeElement.tagName === 'INPUT';
      if (e.key === 'Escape') { closeOverlay(); return; }
      if (typing) return;
      if (e.key === 'ArrowUp') { e.preventDefault(); changeChannel(-1); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); changeChannel(1); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); openOverlay(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); closeOverlay(); }
    });

    /* swipe on video: up/down = zap, left = open picker */
    var sx=0, sy=0, st=0, sok=false;
    player.addEventListener('touchstart', function (e) {
      sok = !e.target.closest('.overlay, .vol-pop, .pbtn, .chg-btn');
      var t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY; st = Date.now();
    }, { passive: true });
    player.addEventListener('touchend', function (e) {
      if (!sok) return;
      var t = e.changedTouches[0], dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
      if (dt > 800) return;
      var adx = Math.abs(dx), ady = Math.abs(dy);
      if (Math.max(adx, ady) < 50) return;
      if (ady > adx) { if (dy < 0) changeChannel(1); else changeChannel(-1); }
      else if (dx < 0) openOverlay();
      else closeOverlay();
    }, { passive: true });

    /* ---- Clock ---- */
    function updateClock() {
      var d = new Date(), h = d.getHours(), ap = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
      document.getElementById('clock').textContent = String(h12).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ' ' + ap;
    }
    updateClock(); setInterval(updateClock, 1000);

    /* ---- Render channel list ---- */
    function renderList() {
      var q = searchInput.value.trim().toLowerCase();
      listEl.innerHTML = ''; var shown = 0;
      allItems.forEach(function (item, idx) {
        if (q && item.name.toLowerCase().indexOf(q) === -1) return;
        if (currentFilter === 'fav' && !favs[item.url]) return;
        else if (currentFilter !== 'all' && currentFilter !== 'fav' && item.group !== currentFilter) return;
        shown++;
        var isActive = item.url === activeUrl;
        var row = document.createElement('div'); row.className = 'row' + (isActive ? ' active' : ''); row.dataset.url = item.url;
        var logo = document.createElement('div'); logo.className = 'logo';
        var img = document.createElement('img'); img.src = item.logo; img.alt = item.name; img.onerror = function () { logo.style.visibility = 'hidden'; }; logo.appendChild(img);
        var info = document.createElement('div'); info.className = 'rinfo';
        var nm = document.createElement('div'); nm.className = 'rname'; nm.textContent = item.name;
        var mt = document.createElement('div'); mt.className = 'rmeta';
        var nu = document.createElement('span'); nu.className = 'rnum'; nu.textContent = idx + 1;
        var ct = document.createElement('span'); ct.className = 'rcat'; ct.textContent = item.group || '';
        mt.appendChild(nu); mt.appendChild(ct); info.appendChild(nm); info.appendChild(mt);
        row.appendChild(logo); row.appendChild(info);
        if (isActive) { var live = document.createElement('div'); live.className = 'live'; live.innerHTML = '<span class="lg"></span>LIVE'; row.appendChild(live); }
        var star = document.createElement('div');
        star.className = 'star' + (favs[item.url] ? ' on' : '');
        star.textContent = favs[item.url] ? '★' : '☆';
        star.addEventListener('click', function (e) {
          e.stopPropagation();
          toggleFav(item.url);
          star.classList.toggle('on'); star.textContent = favs[item.url] ? '★' : '☆';
          if (currentFilter === 'fav' && !favs[item.url]) row.remove();
        });
        row.appendChild(star);
        row.addEventListener('click', function () { loadChannel(item); closeOverlay(); });
        listEl.appendChild(row);
      });
      if (!shown) {
        var em = document.createElement('div'); em.className = 'empty';
        em.textContent = currentFilter === 'fav' ? 'ยังไม่มีช่องโปรด — กด ☆ เพื่อเพิ่ม' : 'ไม่พบช่องที่ค้นหา';
        listEl.appendChild(em);
      }
    }
    searchInput.addEventListener('input', renderList);

    function renderChips() {
      var groups = [];
      allItems.forEach(function (it) { if (it.group && groups.indexOf(it.group) === -1) groups.push(it.group); });
      var defs = [{ id: 'all', label: 'ทั้งหมด' }, { id: 'fav', label: '★ โปรด' }];
      groups.forEach(function (g) { defs.push({ id: g, label: g }); });
      chipsEl.innerHTML = '';
      defs.forEach(function (d) {
        var c = document.createElement('div');
        c.className = 'chip' + (currentFilter === d.id ? ' active' : '');
        c.textContent = d.label;
        c.addEventListener('click', function () {
          currentFilter = d.id;
          chipsEl.querySelectorAll('.chip').forEach(function (x) { x.classList.remove('active'); });
          c.classList.add('active');
          renderList();
          listEl.scrollTop = 0;
        });
        chipsEl.appendChild(c);
      });
    }

    /* ---- Boot ---- */
    function showPlaylistError(message) {
      loadSession++; activeItem = null; activeUrl = null; player.classList.remove('loading');
      npName.textContent = message; npStatus.textContent = ''; npStatus.className = 'np-status'; retryBtn.classList.remove('show'); showNP(true);
      listEl.innerHTML = '<div class="empty"></div>'; listEl.firstChild.textContent = message;
    }
    fetch('iptv.m3u8').then(function (r) {
      if (!r.ok) throw new Error('playlist request failed');
      return r.text();
    }).then(function (text) {
      allItems = parseM3U(text).filter(function (item) { return item.name && item.url; });
      if (!allItems.length) throw new Error('playlist is empty or invalid');
      renderChips(); renderList(); loadChannel(allItems[0]);
    }).catch(function () { showPlaylistError('โหลดรายชื่อช่องไม่สำเร็จ'); });

    /* ---- PWA ---- */
    if ('serviceWorker' in navigator) { window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
    var installBtn = document.getElementById('installBtn'), deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'flex'; });
    installBtn.addEventListener('click', function () { if (!deferredPrompt) return; deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function () { deferredPrompt = null; installBtn.style.display = 'none'; }); });
    window.addEventListener('appinstalled', function () { installBtn.style.display = 'none'; });
  </script>
</body>
</html>
