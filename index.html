<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Hotel — Live Stream</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0e14;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .player-wrap {
      width: 100%;
      max-width: 960px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    .note {
      font-size: 0.85rem;
      color: #7d8590;
      text-align: center;
    }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🏨 Steam Hotel</h1>
  <div class="player-wrap">
    <video id="video" controls autoplay muted playsinline></video>
  </div>
  <p class="note">HLS stream • <a id="m3u8link" href="playlist.m3u8">playlist.m3u8</a></p>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    var video = document.getElementById('video');
    var src = 'playlist.m3u8';
    if (Hls.isSupported()) {
      var hls = new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari / iOS native HLS
      video.src = src;
    }
  </script>
</body>
</html>
