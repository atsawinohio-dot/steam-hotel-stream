<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Hotel — IPTV</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #05070c;
      color: #e6edf3;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: #0a0e14;
      border-bottom: 1px solid #1b212c;
    }
    .topbar h1 {
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .topbar .count {
      font-size: 0.75rem;
      color: #7d8590;
      white-space: nowrap;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      padding: 16px;
      align-items: start;
    }

    /* ---- Sidebar (channel list) ---- */
    .sidebar {
      background: #0d1119;
      border: 1px solid #1b212c;
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
    }
    .search-box {
      padding: 12px;
      border-bottom: 1px solid #1b212c;
    }
    .search-box input {
      width: 100%;
      background: #161c27;
      border: 1px solid #262e3d;
      color: #e6edf3;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.88rem;
      outline: none;
    }
    .search-box input:focus { border-color: #58a6ff; }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      border-bottom: 1px solid #1b212c;
      scrollbar-width: thin;
    }
    .tab {
      flex: none;
      background: #161c27;
      border: 1px solid #262e3d;
      color: #9aa4b2;
      font-size: 0.76rem;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { color: #e6edf3; }
    .tab.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
      font-weight: 600;
    }

    .ch-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px;
    }
    .ch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 8px;
      cursor: pointer;
    }
    .ch-row:hover { background: #161c27; }
    .ch-row.active {
      background: #142033;
      box-shadow: inset 3px 0 0 #58a6ff;
    }
    .ch-row img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 6px;
      background: #1c2330;
      flex: none;
    }
    .ch-row .ch-meta { min-width: 0; }
    .ch-row .ch-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-row .ch-group {
      font-size: 0.72rem;
      color: #7d8590;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty-msg {
      padding: 24px 12px;
      text-align: center;
      color: #7d8590;
      font-size: 0.85rem;
    }

    /* ---- Main / player ---- */
    .main {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    .now-playing {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #11161f;
      font-size: 0.9rem;
    }
    .now-playing img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      border-radius: 4px;
      background: #1c2330;
    }
    .now-playing .name { font-weight: 600; }
    .now-playing .status {
      margin-left: auto;
      font-size: 0.78rem;
      color: #7d8590;
    }
    .now-playing .status.error { color: #f85149; }
    .now-playing .status.ok { color: #3fb950; }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f85149;
      display: inline-block;
    }
    .fs-btn {
      background: #1c2330;
      border: 1px solid #2a3444;
      color: #e6edf3;
      font-size: 0.78rem;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .fs-btn:hover { border-color: #58a6ff; }

    .app:fullscreen,
    .main:fullscreen {
      height: 100vh;
      background: #05070c;
    }
    .main:fullscreen video { max-height: 78vh; }

    a { color: #58a6ff; text-decoration: none; }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        max-height: 60vh;
        order: 2;
      }
      .main { order: 1; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🏨 Steam Hotel IPTV</h1>
    <span class="count" id="chCount"></span>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="ค้นหาช่อง...">
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="ch-list" id="chList"></div>
    </aside>

    <div class="main">
      <video id="video" controls controlsList="nofullscreen" autoplay muted loop playsinline></video>
      <div class="now-playing">
        <img id="npLogo" src="" alt="">
        <span class="name" id="npName">กำลังโหลด…</span>
        <span id="npStatus" class="status"></span>
        <button id="fsBtn" class="fs-btn" type="button">⛶ เต็มจอ</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    var video = document.getElementById('video');
    var npLogo = document.getElementById('npLogo');
    var npName = document.getElementById('npName');
    var npStatus = document.getElementById('npStatus');
    var chListEl = document.getElementById('chList');
    var tabsEl = document.getElementById('tabs');
    var searchInput = document.getElementById('searchInput');
    var chCountEl = document.getElementById('chCount');
    var hls = null;
    var allItems = [];
    var activeGroup = 'ทั้งหมด';
    var activeUrl = null;

    function parseM3U(text) {
      var lines = text.split(/\r?\n/);
      var items = [];
      var pending = null;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        if (line.indexOf('#EXTINF') === 0) {
          var comma = line.lastIndexOf(',');
          var attrsPart = line.substring(0, comma);
          var name = line.substring(comma + 1).trim();
          var logo = (attrsPart.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          var group = (attrsPart.match(/group-title="([^"]*)"/) || [])[1] || 'อื่นๆ';
          group = group.split(';')[0];
          pending = { name: name, logo: logo, group: group };
        } else if (line.indexOf('#') !== 0 && pending) {
          pending.url = line;
          items.push(pending);
          pending = null;
        }
      }
      return items;
    }

    function loadChannel(item, rowEl) {
      document.querySelectorAll('.ch-row.active').forEach(function (el) { el.classList.remove('active'); });
      if (rowEl) rowEl.classList.add('active');
      activeUrl = item.url;

      npLogo.src = item.logo;
      npLogo.style.display = item.logo ? '' : 'none';
      npName.textContent = item.name;
      npStatus.innerHTML = '<span class="live-dot"></span> กำลังเชื่อมต่อ…';
      npStatus.className = 'status';

      if (hls) { hls.destroy(); hls = null; }
      video.removeAttribute('src');
      video.load();

      if (Hls.isSupported()) {
        hls = new Hls();
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          npStatus.innerHTML = '<span class="live-dot"></span> เล่นอยู่';
          npStatus.className = 'status ok';
        });
        hls.on(Hls.Events.ERROR, function (evt, data) {
          if (data.fatal) {
            npStatus.textContent = 'เล่นช่องนี้ไม่ได้';
            npStatus.className = 'status error';
          }
        });
        hls.loadSource(item.url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = item.url;
        video.addEventListener('loadedmetadata', function () {
          npStatus.innerHTML = '<span class="live-dot"></span> เล่นอยู่';
          npStatus.className = 'status ok';
        }, { once: true });
        video.addEventListener('error', function () {
          npStatus.textContent = 'เล่นช่องนี้ไม่ได้';
          npStatus.className = 'status error';
        }, { once: true });
      }
      video.play().catch(function () {});
    }

    video.addEventListener('ended', function () {
      video.currentTime = 0;
      video.play();
    });

    var appEl = document.querySelector('.app');
    var fsBtn = document.getElementById('fsBtn');
    fsBtn.addEventListener('click', function () {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        appEl.requestFullscreen();
      }
    });
    document.addEventListener('fullscreenchange', function () {
      fsBtn.textContent = document.fullscreenElement ? '⛶ ออกจากเต็มจอ' : '⛶ เต็มจอ';
    });

    function renderList() {
      var q = searchInput.value.trim().toLowerCase();
      var filtered = allItems.filter(function (it) {
        var matchGroup = activeGroup === 'ทั้งหมด' || it.group === activeGroup;
        var matchQuery = !q || it.name.toLowerCase().indexOf(q) !== -1;
        return matchGroup && matchQuery;
      });

      chListEl.innerHTML = '';
      if (!filtered.length) {
        var empty = document.createElement('div');
        empty.className = 'empty-msg';
        empty.textContent = 'ไม่พบช่องที่ค้นหา';
        chListEl.appendChild(empty);
        return;
      }

      filtered.forEach(function (item) {
        var row = document.createElement('div');
        row.className = 'ch-row';
        if (item.url === activeUrl) row.classList.add('active');
        var img = document.createElement('img');
        img.src = item.logo;
        img.alt = item.name;
        img.onerror = function () { img.style.visibility = 'hidden'; };
        var meta = document.createElement('div');
        meta.className = 'ch-meta';
        var name = document.createElement('div');
        name.className = 'ch-name';
        name.textContent = item.name;
        var group = document.createElement('div');
        group.className = 'ch-group';
        group.textContent = item.group;
        meta.appendChild(name);
        meta.appendChild(group);
        row.appendChild(img);
        row.appendChild(meta);
        row.addEventListener('click', function () { loadChannel(item, row); });
        chListEl.appendChild(row);
      });
    }

    function renderTabs() {
      var groups = ['ทั้งหมด'];
      allItems.forEach(function (it) {
        if (groups.indexOf(it.group) === -1) groups.push(it.group);
      });
      tabsEl.innerHTML = '';
      groups.forEach(function (g) {
        var tab = document.createElement('button');
        tab.className = 'tab' + (g === activeGroup ? ' active' : '');
        tab.type = 'button';
        tab.textContent = g;
        tab.addEventListener('click', function () {
          activeGroup = g;
          document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
          tab.classList.add('active');
          renderList();
        });
        tabsEl.appendChild(tab);
      });
    }

    searchInput.addEventListener('input', renderList);

    fetch('iptv.m3u8')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        allItems = parseM3U(text);
        chCountEl.textContent = allItems.length + ' ช่อง';
        renderTabs();
        renderList();
        if (allItems.length) {
          var firstRow = chListEl.querySelector('.ch-row');
          loadChannel(allItems[0], firstRow);
        }
      })
      .catch(function () {
        npName.textContent = 'โหลดรายชื่อช่องไม่สำเร็จ';
        npStatus.textContent = '';
      });
  </script>
</body>
</html>
