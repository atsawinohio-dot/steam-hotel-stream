<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Hotel — IPTV</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a1420;
      color: #eef2f7;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      position: relative;
      height: 100vh;
    }

    /* ---- Backdrop + popup channel list ---- */
    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .menu-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 400px;
      max-width: 86vw;
      background: rgba(10,20,32,0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      z-index: 21;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 12px 0 40px rgba(0,0,0,0.5);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 0;
    }
    .sidebar-head .search-box { flex: 1; margin: 0; }
    .close-btn {
      flex: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #eef2f7;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .close-btn:hover { border-color: #4ee1c1; }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #eef2f7;
      font-size: 0.95rem;
      outline: none;
    }
    .search-box input::placeholder { color: #5c7290; }
    .search-box .icon { color: #5c7290; font-size: 1rem; }

    .ch-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 16px;
    }
    .ch-list::-webkit-scrollbar { width: 6px; }
    .ch-list::-webkit-scrollbar-thumb { background: #2a4160; border-radius: 3px; }

    .ch-row {
      display: grid;
      grid-template-columns: 40px 1px 1fr 60px;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      cursor: pointer;
      position: relative;
    }
    .ch-row:hover { background: #10203380; }
    .ch-row.active {
      background: #12707a;
    }
    .ch-row.active::before {
      content: "▶";
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      color: #7fe8e0;
    }
    .ch-num {
      font-size: 1.15rem;
      font-weight: 300;
      color: #7d90ab;
      text-align: right;
    }
    .ch-row.active .ch-num { color: #d8fbf7; }
    .ch-divider {
      width: 1px;
      height: 26px;
      background: #22354e;
    }
    .ch-name {
      font-size: 1rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-logo-box {
      width: 56px;
      height: 36px;
      border-radius: 6px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: none;
    }
    .ch-logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .empty-msg {
      padding: 30px 20px;
      text-align: center;
      color: #5c7290;
      font-size: 0.9rem;
    }

    /* ---- Main video panel ---- */
    .main {
      position: absolute;
      inset: 0;
      background: #000;
    }
    .menu-btn {
      position: absolute;
      bottom: 20px;
      right: 70px;
      background: rgba(10,20,32,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 1.1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s;
      z-index: 5;
    }
    .menu-btn:hover { opacity: 1; }
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }
    .clock {
      position: absolute;
      top: 24px;
      right: 28px;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
      letter-spacing: 1px;
      pointer-events: none;
    }
    .fs-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(10,20,32,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 1.1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.15s;
    }
    .fs-btn:hover { opacity: 1; }

    .ch-info-overlay {
      position: absolute;
      left: 28px;
      bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(8,14,24,0.55);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .ch-info-overlay.show { opacity: 1; }
    .ch-info-overlay img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 4px;
      background: #fff;
    }
    .ch-info-overlay .name { font-weight: 600; font-size: 1rem; }
    .ch-info-overlay .status { font-size: 0.78rem; color: #9aa9bd; }
    .ch-info-overlay .status.error { color: #ff6b6b; }
    .ch-info-overlay .status.ok { color: #4ee1c1; }

    @media (max-width: 860px) {
      .sidebar { width: 86vw; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="main">
      <video id="video" controls controlsList="nofullscreen" autoplay muted loop playsinline></video>
      <div class="clock" id="clock"></div>
      <button class="menu-btn" id="menuBtn" type="button" title="รายการช่อง">☰</button>
      <button class="fs-btn" id="fsBtn" type="button" title="เต็มจอ">⛶</button>
      <div class="ch-info-overlay" id="chInfoOverlay">
        <img id="npLogo" src="" alt="">
        <div>
          <div class="name" id="npName">กำลังโหลด…</div>
          <div class="status" id="npStatus"></div>
        </div>
      </div>
    </div>

    <div class="menu-backdrop" id="menuBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="ค้นหาช่อง...">
          <span class="icon">🔍</span>
        </div>
        <button class="close-btn" id="closeBtn" type="button">✕</button>
      </div>
      <div class="ch-list" id="chList"></div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script>
    var video = document.getElementById('video');
    var npLogo = document.getElementById('npLogo');
    var npName = document.getElementById('npName');
    var npStatus = document.getElementById('npStatus');
    var chInfoOverlay = document.getElementById('chInfoOverlay');
    var chListEl = document.getElementById('chList');
    var searchInput = document.getElementById('searchInput');
    var hls = null;
    var allItems = [];
    var activeUrl = null;
    var overlayTimer = null;

    function parseM3U(text) {
      var lines = text.split(/\r?\n/);
      var items = [];
      var pending = null;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        if (line.indexOf('#EXTINF') === 0) {
          var comma = line.lastIndexOf(',');
          var attrsPart = line.substring(0, comma);
          var name = line.substring(comma + 1).trim();
          var logo = (attrsPart.match(/tvg-logo="([^"]*)"/) || [])[1] || '';
          var group = (attrsPart.match(/group-title="([^"]*)"/) || [])[1] || 'อื่นๆ';
          group = group.split(';')[0];
          pending = { name: name, logo: logo, group: group };
        } else if (line.indexOf('#') !== 0 && pending) {
          pending.url = line;
          items.push(pending);
          pending = null;
        }
      }
      return items;
    }

    function showOverlay() {
      chInfoOverlay.classList.add('show');
      clearTimeout(overlayTimer);
      overlayTimer = setTimeout(function () {
        if (npStatus.className.indexOf('error') === -1) {
          chInfoOverlay.classList.remove('show');
        }
      }, 3500);
    }

    function loadChannel(item, rowEl) {
      document.querySelectorAll('.ch-row.active').forEach(function (el) { el.classList.remove('active'); });
      if (rowEl) rowEl.classList.add('active');
      activeUrl = item.url;

      npLogo.src = item.logo;
      npLogo.style.display = item.logo ? '' : 'none';
      npName.textContent = item.name;
      npStatus.textContent = 'กำลังเชื่อมต่อ…';
      npStatus.className = 'status';
      showOverlay();

      if (hls) { hls.destroy(); hls = null; }
      video.removeAttribute('src');
      video.load();

      if (Hls.isSupported()) {
        hls = new Hls();
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          npStatus.textContent = 'เล่นอยู่';
          npStatus.className = 'status ok';
          showOverlay();
        });
        hls.on(Hls.Events.ERROR, function (evt, data) {
          if (data.fatal) {
            npStatus.textContent = 'เล่นช่องนี้ไม่ได้';
            npStatus.className = 'status error';
            chInfoOverlay.classList.add('show');
          }
        });
        hls.loadSource(item.url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = item.url;
        video.addEventListener('loadedmetadata', function () {
          npStatus.textContent = 'เล่นอยู่';
          npStatus.className = 'status ok';
          showOverlay();
        }, { once: true });
        video.addEventListener('error', function () {
          npStatus.textContent = 'เล่นช่องนี้ไม่ได้';
          npStatus.className = 'status error';
          chInfoOverlay.classList.add('show');
        }, { once: true });
      }
      video.play().catch(function () {});
    }

    video.addEventListener('ended', function () {
      video.currentTime = 0;
      video.play();
    });

    var mainEl = document.querySelector('.main');
    var fsBtn = document.getElementById('fsBtn');
    fsBtn.addEventListener('click', function () {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.querySelector('.app').requestFullscreen();
      }
    });

    var sidebar = document.getElementById('sidebar');
    var menuBackdrop = document.getElementById('menuBackdrop');
    var menuBtn = document.getElementById('menuBtn');
    var closeBtn = document.getElementById('closeBtn');

    function openMenu() {
      sidebar.classList.add('open');
      menuBackdrop.classList.add('open');
      searchInput.focus();
    }
    function closeMenu() {
      sidebar.classList.remove('open');
      menuBackdrop.classList.remove('open');
    }
    menuBtn.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    menuBackdrop.addEventListener('click', closeMenu);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeMenu();
    });

    function updateClock() {
      var d = new Date();
      var h = d.getHours();
      var ampm = h >= 12 ? 'PM' : 'AM';
      var h12 = h % 12; if (h12 === 0) h12 = 12;
      var m = String(d.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = String(h12).padStart(2, '0') + ':' + m + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);

    function renderList() {
      var q = searchInput.value.trim().toLowerCase();
      chListEl.innerHTML = '';
      var shown = 0;

      allItems.forEach(function (item, idx) {
        if (q && item.name.toLowerCase().indexOf(q) === -1) return;
        shown++;

        var row = document.createElement('div');
        row.className = 'ch-row';
        if (item.url === activeUrl) row.classList.add('active');

        var num = document.createElement('div');
        num.className = 'ch-num';
        num.textContent = idx + 1;

        var divider = document.createElement('div');
        divider.className = 'ch-divider';

        var name = document.createElement('div');
        name.className = 'ch-name';
        name.textContent = item.name;

        var logoBox = document.createElement('div');
        logoBox.className = 'ch-logo-box';
        var img = document.createElement('img');
        img.src = item.logo;
        img.alt = item.name;
        img.onerror = function () { logoBox.style.visibility = 'hidden'; };
        logoBox.appendChild(img);

        row.appendChild(num);
        row.appendChild(divider);
        row.appendChild(name);
        row.appendChild(logoBox);
        row.addEventListener('click', function () { loadChannel(item, row); closeMenu(); });
        chListEl.appendChild(row);
      });

      if (!shown) {
        var empty = document.createElement('div');
        empty.className = 'empty-msg';
        empty.textContent = 'ไม่พบช่องที่ค้นหา';
        chListEl.appendChild(empty);
      }
    }

    searchInput.addEventListener('input', renderList);

    fetch('iptv.m3u8')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        allItems = parseM3U(text);
        renderList();
        if (allItems.length) {
          var firstRow = chListEl.querySelector('.ch-row');
          loadChannel(allItems[0], firstRow);
        }
      })
      .catch(function () {
        npName.textContent = 'โหลดรายชื่อช่องไม่สำเร็จ';
        npStatus.textContent = '';
        chInfoOverlay.classList.add('show');
      });
  </script>
</body>
</html>
